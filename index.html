<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UFV Nav - WebAR Prototype</title>
    <!-- A-Frame Library -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <!-- AR.js for A-Frame -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        .ui-overlay {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        .route-display {
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-family: sans-serif;
            font-size: 14px;
            max-width: 80vw;
            text-align: center;
            display: none;
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        select,
        button {
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: none;
        }

        button {
            background: #4CC3D9;
            color: white;
            cursor: pointer;
        }

        select {
            background: white;
            color: black;
        }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">
    <div class="ui-overlay">
        <div id="route-result" class="route-display"></div>
        <div class="controls">
            <select id="destination-select">
                <option value="G230">Room G230</option>
                <option value="G250">Room G250</option>
                <option value="GE102_Elevator">Elevator</option>
                <option value="GH210_Rotunda">Rotunda</option>
            </select>
            <button onclick="getRoute()">Navigate</button>
        </div>
        <button onclick="rotateArrow()">Rotate Arrow 90°</button>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">

        <a-marker preset="hiro">
            <!-- Navigation Arrow Entity -->
            <a-entity id="nav-arrow" position="0 0.5 0" rotation="0 0 0">
                <!-- Arrow Stem (Cylinder) -->
                <a-cylinder position="0 0 0" radius="0.1" height="0.5" rotation="90 0 0" color="#4CC3D9">
                </a-cylinder>
                <!-- Arrow Head (Cone) -->
                <a-cone position="0 0 -0.4" radius-bottom="0.25" radius-top="0" height="0.4" rotation="90 0 0"
                    color="#FFC65D">
                </a-cone>
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        let currentRotation = 0;
        function rotateArrow() {
            const arrow = document.querySelector('#nav-arrow');
            currentRotation += 90;
            arrow.setAttribute('rotation', `0 ${currentRotation} 0`);
        }

        async function getRoute() {
            const display = document.getElementById('route-result');
            const destination = document.getElementById('destination-select').value;

            display.style.display = 'block';
            display.innerText = `Fetching route to ${destination}...`;

            try {
                const response = await fetch(`https://cruel-rings-double.loca.lt/navigate?start=G210&destination=${destination}`, {
                    method: 'GET',
                    headers: {
                        'x-api-key': 'ufv_super_secret_key_2026',
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error(`Error: ${response.status}`);
                }

                const data = await response.json();
                display.innerText = "Route: " + data.join(" → ");
            } catch (error) {
                display.innerText = "Failed to get route: " + error.message;
            }
        }
    </script>
</body>

</html>
