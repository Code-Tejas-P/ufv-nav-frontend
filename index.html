<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UFV Nav - WebAR Prototype</title>
    <!-- A-Frame Library -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <!-- AR.js for A-Frame -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        .ui-overlay {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background: #4CC3D9;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">
    <div class="ui-overlay">
        <button onclick="rotateArrow()">Rotate 90°</button>
    </div>

    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false;"
        vr-mode-ui="enabled: false">
        
        <a-marker preset="hiro">
            <!-- Navigation Arrow Entity -->
            <a-entity id="nav-arrow" position="0 0.5 0" rotation="0 0 0">
                <!-- Arrow Stem (Cylinder) -->
                <a-cylinder 
                    position="0 0 0" 
                    radius="0.1" 
                    height="0.5" 
                    rotation="90 0 0" 
                    color="#4CC3D9">
                </a-cylinder>
                <!-- Arrow Head (Cone) -->
                <a-cone 
                    position="0 0 -0.4" 
                    radius-bottom="0.25" 
                    radius-top="0" 
                    height="0.4" 
                    rotation="90 0 0" 
                    color="#FFC65D">
                </a-cone>
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        let currentRotation = 0;
        function rotateArrow() {
            const arrow = document.querySelector('#nav-arrow');
            currentRotation += 90;
            arrow.setAttribute('rotation', `0 ${currentRotation} 0`);
        }
    </script>
</body>
</html>
