<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UFV Nav - WebAR Prototype</title>
    <!-- A-Frame Library -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <!-- AR.js for A-Frame -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        .ui-overlay {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        .route-display {
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-family: sans-serif;
            font-size: 14px;
            max-width: 80vw;
            text-align: center;
            display: none;
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        select,
        button {
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: none;
        }

        button {
            background: #4CC3D9;
            color: white;
            cursor: pointer;
        }

        select {
            background: white;
            color: black;
        }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">
    <div class="ui-overlay">
        <div id="route-result" class="route-display"></div>

        <div style="display: flex; gap: 10px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px;">
            <select id="start-select" style="padding: 5px; font-size: 14px;">
                <option value="G210">Start: G210</option>
                <option value="G230">Start: G230</option>
                <option value="GE102_Elevator">Start: Elevator</option>
            </select>
            <select id="dest-select" style="padding: 5px; font-size: 14px;">
                <option value="G250">Go to: G250</option>
                <option value="G210">Go to: G210</option>
                <option value="GE102_Elevator">Go to: Elevator</option>
            </select>
        </div>

        <div style="display: flex; gap: 10px;">
            <button onclick="scanSurroundings()" style="background: #ff5722;">Scan Room</button>
            <button onclick="getRoute()">Navigate</button>
            <button onclick="rotateArrow()">Rotate 90°</button>
        </div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">

        <a-marker preset="hiro">
            <!-- Navigation Arrow Entity -->
            <a-entity id="nav-arrow" position="0 0.5 0" rotation="0 0 0">
                <!-- Arrow Stem (Cylinder) -->
                <a-cylinder position="0 0 0" radius="0.1" height="0.5" rotation="90 0 0" color="#4CC3D9">
                </a-cylinder>
                <!-- Arrow Head (Cone) -->
                <a-cone position="0 0 -0.4" radius-bottom="0.25" radius-top="0" height="0.4" rotation="90 0 0"
                    color="#FFC65D">
                </a-cone>
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script src="app.js"></script>
</body>

</html>
