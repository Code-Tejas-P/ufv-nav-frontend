<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UFV Nav - WebAR Prototype</title>
    <!-- A-Frame Library -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <!-- AR.js for A-Frame -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        .ui-overlay {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        .route-display {
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-family: sans-serif;
            font-size: 14px;
            max-width: 80vw;
            text-align: center;
            display: none;
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        select,
        button {
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: none;
        }

        button {
            background: #4CC3D9;
            color: white;
            cursor: pointer;
        }

        select {
            background: white;
            color: black;
        }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">
    <div class="ui-overlay">
        <div id="route-result" class="route-display"></div>

        <div style="display: flex; gap: 10px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px;">
            <select id="start-select" style="padding: 5px; font-size: 14px;">
                <option value="G210">Start: G210</option>
                <option value="G230">Start: G230</option>
                <option value="GE102_Elevator">Start: Elevator</option>
            </select>
            <select id="dest-select" style="padding: 5px; font-size: 14px;">
                <option value="G250">Go to: G250</option>
                <option value="G210">Go to: G210</option>
                <option value="GE102_Elevator">Go to: Elevator</option>
            </select>
        </div>

        <div style="display: flex; gap: 10px;">
            <button onclick="scanSurroundings()" style="background: #ff5722;">Scan Room</button>
            <button onclick="getRoute()">Navigate</button>
            <button onclick="rotateArrow()">Rotate 90°</button>
        </div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">

        <a-marker preset="hiro">
            <!-- Navigation Arrow Entity -->
            <a-entity id="nav-arrow" position="0 0.5 0" rotation="0 0 0">
                <!-- Arrow Stem (Cylinder) -->
                <a-cylinder position="0 0 0" radius="0.1" height="0.5" rotation="90 0 0" color="#4CC3D9">
                </a-cylinder>
                <!-- Arrow Head (Cone) -->
                <a-cone position="0 0 -0.4" radius-bottom="0.25" radius-top="0" height="0.4" rotation="90 0 0"
                    color="#FFC65D">
                </a-cone>
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        let currentRotation = 0;
        function rotateArrow() {
            const arrow = document.querySelector('#nav-arrow');
            currentRotation += 90;
            arrow.setAttribute('rotation', `0 ${currentRotation} 0`);
        }

        async function getRoute() {
            const display = document.getElementById('route-result');

            // 1. Grab the values from the dropdowns
            const startRoom = document.getElementById('start-select').value;
            const destRoom = document.getElementById('dest-select').value;

            display.style.display = 'block';
            display.innerText = "Calculating route...";

            try {
                const response = await fetch(`https://discuss-afternoon-unique-stops.trycloudflare.com/navigate?start=G210&destination=${destination}`, {
                    method: 'GET',
                    headers: {
                        'x-api-key': 'ufv_super_secret_key_2026',
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error(`Error: ${response.status}`);
                }

                const data = await response.json();
                display.innerText = "Route: " + data.route.join(" → ");
            } catch (error) {
                display.innerText = "Failed to get route: " + error.message;
            }
        }
        async function scanSurroundings() {
            const display = document.getElementById('route-result');
            display.style.display = 'block';
            display.innerText = "Scanning room sign...";

            try {
                // 1. Find the hidden camera feed AR.js is using
                const video = document.querySelector('video');
                if (!video) throw new Error("Camera feed not found");

                // 2. Create an invisible canvas to take the snapshot
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const context = canvas.getContext('2d');
                context.drawImage(video, 0, 0, canvas.width, canvas.height);

                // 3. Convert the snapshot to a Base64 text string
                const imageData = canvas.toDataURL('image/jpeg', 0.8);

                // 4. Send it to our new FastAPI endpoint
                // IMPORTANT: Update this URL to your current Cloudflare link!
                const response = await fetch('https://discuss-afternoon-unique-stops.trycloudflare.com/scan-room', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: imageData })
                });

                const data = await response.json();

                // 5. Handle the result
                if (data.status === "success") {
                    display.innerText = `Location Found: ${data.detected_room}!`;

                    // Here, you would update your dropdown menu to match this room
                    document.getElementById('start-select').value = data.detected_room;

                } else {
                    display.innerText = "No room number detected. Try moving closer to the sign.";
                }

            } catch (error) {
                console.error(error);
                display.innerText = "Failed to scan: " + error.message;
            }
        }
    </script>
</body>

</html>
